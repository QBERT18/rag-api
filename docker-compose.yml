services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: rag-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma3:1b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Pulling chat model: $$OLLAMA_CHAT_MODEL"
        ollama pull "$$OLLAMA_CHAT_MODEL"
        echo "Pulling embedding model: $$OLLAMA_EMBEDDING_MODEL"
        ollama pull "$$OLLAMA_EMBEDDING_MODEL"
        echo "Models ready."
    restart: "no"

  backend:
    image: ghcr.io/qbert18/rag-api-backend:latest
    build:
      context: ./backend
    container_name: rag-backend
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma3:1b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      CHROMA_DB_PATH: /data/chroma_db
      WORKSPACE_DB_PATH: /data/workspace.db
      CORS_ALLOW_ORIGINS: http://localhost:3000
    volumes:
      - ./data/backend:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/qbert18/rag-api-frontend:latest
    build:
      context: ./frontend
    container_name: rag-frontend
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      - backend
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: "3000"
      NUXT_PUBLIC_API_BASE: ${FRONTEND_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: rag-caddy
    profiles: ["tunnel"]
    depends_on:
      - backend
      - frontend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: rag-ngrok
    profiles: ["tunnel"]
    depends_on:
      - caddy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: ["http", "caddy:80", "--log=stdout"]
    ports:
      - "4040:4040"   # ngrok inspector — read the public URL here
    restart: unless-stopped

  # Auto-pulls new backend/frontend images from GHCR and recreates them.
  # Only the two app containers are watched (label-scoped); ollama/caddy/ngrok
  # are left alone. Tunnel-profile only, so it never runs in local dev.
  watchtower:
    image: containrrr/watchtower
    container_name: rag-watchtower
    profiles: ["tunnel"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"          # delete old images after update
      WATCHTOWER_LABEL_ENABLE: "true"     # only watch labeled containers
      WATCHTOWER_POLL_INTERVAL: "120"     # check GHCR every 120s
      DOCKER_API_VERSION: "1.41"          # match modern daemons (min 1.40+)
    restart: unless-stopped
